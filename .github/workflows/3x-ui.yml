name: Tailscale Server with 3x-ui 
on:
  workflow_dispatch: {}  # Manual trigger only
  
jobs:
  run-tailscale:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # GitHub will kill after 6 hours

    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Enable IP Forwarding
        run: |
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1

      - name: Start Tailscale
        run: |
          sudo tailscale up \
            --authkey ${{ secrets.TAILSCALE_AUTHKEY }} \
            --ssh \
            --advertise-exit-node \
            --hostname=git-server-want-stereo-ui \
            --reset
              
            - name: Install 3x-ui
        run: |
          # Download the install script first
          curl -Ls https://raw.githubusercontent.com/mhsanaei/3x-ui/master/install.sh -o install-3x-ui.sh
          chmod +x install-3x-ui.sh
          
          # Run the installation with automated responses
          # Using printf to send responses to the script
          printf 'n\n2\n\n' | sudo bash install-3x-ui.sh
          
          echo "✅ 3x-ui installed"
          
          # Wait for service to fully start
          sleep 10
          
          # Get panel info
          echo "========================================"
          echo "📊 3x-ui Panel Information"
          echo "========================================"
          sudo /usr/local/x-ui/x-ui settings
          echo "========================================"
          
          # Save credentials to a file
          sudo /usr/local/x-ui/x-ui settings > ~/3x-ui-credentials.txt 2>&1

      - name: Install and Configure Ngrok (Option 1)
        run: |
          # Install ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc > /dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok -y
          
          # Configure ngrok with your token
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          
          # Get the panel port from 3x-ui
          PANEL_PORT=$(sudo /usr/local/x-ui/x-ui settings | grep "Panel port" | awk '{print $NF}')
          BASE_PATH=$(sudo /usr/local/x-ui/x-ui settings | grep "Base Path" | awk '{print $NF}')
          
          # Start ngrok in background
          ngrok http $PANEL_PORT --log=stdout > ngrok.log 2>&1 &
          sleep 5
          
          # Get the ngrok URL
          NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          
          echo "========================================"
          echo "🌐 NGROK PUBLIC ACCESS URL (Option 1)"
          echo "========================================"
          echo "Panel URL: $NGROK_URL$BASE_PATH"
          echo ""
          echo "This URL is publicly accessible for 2 hours!"
          echo "========================================"

      - name: Install and Configure Playit.gg (Option 2 - Alternative)
        if: always()  # This will run even if ngrok fails
        run: |
          # Install playit.gg as backup tunnel
          curl -SsL https://playit-cloud.github.io/playit-cli/releases/latest/playit-linux-amd64 -o playit
          chmod +x playit
          
          # Get panel port
          PANEL_PORT=$(sudo /usr/local/x-ui/x-ui settings | grep "Panel port" | awk '{print $NF}')
          BASE_PATH=$(sudo /usr/local/x-ui/x-ui settings | grep "Base Path" | awk '{print $NF}')
          
          # Run playit with secret (get from playit.gg)
          nohup ./playit --secret ${{ secrets.PLAYIT_SECRET }} --port $PANEL_PORT > playit.log 2>&1 &
          sleep 5
          
          # Get playit URL (this requires their API, but the URL will be shown in logs)
          echo "========================================"
          echo "🌐 PLAYIT.GG ACCESS (Option 2)"
          echo "========================================"
          echo "Check playit.gg dashboard for URL:"
          echo "https://playit.gg/account/tunnels"
          echo ""
          echo "Your panel port: $PANEL_PORT"
          echo "Base path: $BASE_PATH"
          echo "========================================"

      - name: Create Access Info File
        run: |
          PANEL_PORT=$(sudo /usr/local/x-ui/x-ui settings | grep "Panel port" | awk '{print $NF}')
          BASE_PATH=$(sudo /usr/local/x-ui/x-ui settings | grep "Base Path" | awk '{print $NF}')
          USERNAME=$(sudo /usr/local/x-ui/x-ui settings | grep -A 3 "Current settings" | grep "Username" | awk '{print $NF}')
          PASSWORD=$(sudo /usr/local/x-ui/x-ui settings | grep "Password" | awk '{print $NF}')
          
          cat > ~/3x-ui-access.txt << EOF
          ========================================
          3x-ui PANEL ACCESS INFORMATION
          ========================================
          
          📍 TAILSCALE ACCESS (Your Tailnet Only):
          http://$(tailscale ip -4):$PANEL_PORT$BASE_PATH
          
          🔑 LOGIN CREDENTIALS:
          Username: $USERNAME
          Password: $PASSWORD
          Port: $PANEL_PORT
          Base Path: $BASE_PATH
          
          💻 SSH ACCESS (from your machine):
          ssh runner@$(tailscale ip -4)
          
          ⏰ SESSION EXPIRES: $(date -d '+6 hours')
          ========================================
          EOF

      - name: Show Connection Info
        run: |
          echo "========================================"
          echo "✅ Tailscale Server Active with 3x-ui"
          echo "========================================"
          echo "Hostname: git-server"
          echo "Tailscale IP: $(tailscale ip -4)"
          echo "Started at: $(date)"
          echo "Will run until: $(date -d '+6 hours')"
          echo "========================================"
          
          # Display access info
          echo ""
          cat ~/3x-ui-access.txt
          echo ""

      - name: Keep Alive and Monitor
        run: |
          echo "🟢 Server is running - GitHub will auto-terminate in 6 hours"
          echo "📍 Press Ctrl+C if running locally to stop"
          echo ""
          echo "📱 Access methods:"
          echo "   1. Tailscale: http://$(tailscale ip -4):$(sudo /usr/local/x-ui/x-ui settings | grep "Panel port" | awk '{print $NF}')$(sudo /usr/local/x-ui/x-ui settings | grep "Base Path" | awk '{print $NF}')"
          echo "   2. Ngrok: Check above for URL (expires in 2h)"
          echo "   3. SSH: ssh runner@$(tailscale ip -4)"
          echo ""
          
          # Monitor loop with status updates
          for i in {360..1}; do
            HOURS=$((i / 60))
            MINUTES=$((i % 60))
            
            # Get ngrok status if running
            NGROK_STATUS="Not running"
            if curl -s http://localhost:4040/api/tunnels > /dev/null 2>&1; then
              NGROK_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' 2>/dev/null)
              NGROK_STATUS="Active: $NGROK_URL"
            fi
            
            echo -ne "\r\033[K⏱️  Time remaining: ${HOURS}h ${MINUTES}m | 🌐 Tailscale: Online | 🚇 Ngrok: $NGROK_STATUS"
            sleep 60  # Update every minute
          done
          
          echo ""
          echo "⏰ 6 hours completed - waiting for GitHub termination..."
          sleep infinity

      - name: Cleanup
        if: always()
        run: |
          sudo tailscale down
          pkill ngrok
          pkill playit
