name: Build with Tailscale

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Tailscale
      run: |
        curl -fsSL https://tailscale.com/install.sh | sh
        
    - name: Connect to Tailscale (6 hour limit)
      run: |
        # Convert 6 hours to seconds (6 * 60 * 60 = 21600 seconds)
        sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTHKEY }} --advertise-exit-node --hostname github-actions --timeout 21600
        
    - name: Your build steps here
      run: |
        # Add your actual build commands
        echo "Building with Tailscale connection (active for 6 hours)"
        
    - name: Optional - Check connection status
      run: |
        tailscale status
